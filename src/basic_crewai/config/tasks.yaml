research_task:
  description: >
    Research the web for information about the following company: {target_company}. 
    Identify their industry, what they sell, and their target market.
  expected_output: >
    A summary of 3 paragraphs max on the company's business
  agent: investigator

analysis_task:
  description: >
    Based on the research summary, find 2 concrete opportunities for AI (CrewAI) automation that would save this company time.
  expected_output: >
    A list of 2 weaknesses with the recommended automation solution for each.
  agent: analyst

email_task:
  description: >
    Write a personalized prospecting email to the director of {target_company}. 
    The email must mention one of the opportunities found by the analyst. 
    Keep it short (less than 150 words) and offer a 10-minute call.
  expected_output: >
    the template (Final email ready to be sent, written in French, with a professional but direct tone.
  agent: copywriter
